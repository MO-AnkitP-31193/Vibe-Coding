<div class="products-page">
  <div class="container">
    <h1 class="display-4 fw-bold mb-4">Our Products</h1>
    
    <div class="search-section">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Search products</mat-label>
        <input matInput [(ngModel)]="searchQuery" (input)="onSearch()" placeholder="Search by name or description">
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>
    </div>

    <div class="row g-4" *ngIf="filteredProducts.length > 0">
      <div class="col-md-6 col-lg-4 col-xl-3" *ngFor="let product of filteredProducts">
        <mat-card class="product-card" (click)="viewProduct(product.id)">
          <img mat-card-image [src]="product.image" [alt]="product.name">
          <mat-card-content>
            <mat-card-title>{{ product.name }}</mat-card-title>
            <p class="text-muted">{{ product.description }}</p>
            <div class="price">₹{{ product.price | number }}</div>
          </mat-card-content>
          <mat-card-actions class="d-flex justify-content-between align-items-center">
            <button mat-raised-button color="primary" (click)="addToCart(product, $event)">
              <i class="fas fa-cart-plus me-2"></i>Add to Cart
            </button>
          </mat-card-actions>
        </mat-card>
      </div>
    </div>

    <div class="no-results" *ngIf="filteredProducts.length === 0">
      <i class="fas fa-search"></i>
      <h3>No products found</h3>
      <p class="text-muted">Try adjusting your search</p>
    </div>
  </div>
</div>
