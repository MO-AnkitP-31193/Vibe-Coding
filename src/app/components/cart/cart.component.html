<div class="cart-page">
  <div class="container">
    <h1 class="display-4 fw-bold mb-4">Shopping Cart</h1>

    <div *ngIf="cartItems.length > 0">
      <div class="row g-4">
        <div class="col-lg-8">
          <mat-card *ngFor="let item of cartItems" class="cart-item mb-3">
            <div class="row g-3 align-items-center">
              <div class="col-md-3">
                <img [src]="item.product.image" [alt]="item.product.name" class="img-fluid rounded">
              </div>
              <div class="col-md-3">
                <h5 class="fw-bold">{{ item.product.name }}</h5>
                <p class="text-muted mb-0">{{ item.product.description }}</p>
              </div>
              <div class="col-md-2">
                <div class="price">₹{{ item.product.price | number }}</div>
              </div>
              <div class="col-md-3">
                <div class="quantity-controls">
                  <button mat-mini-fab color="primary" (click)="updateQuantity(item.product.id, item.quantity - 1)">
                    <mat-icon>remove</mat-icon>
                  </button>
                  <span class="quantity">{{ item.quantity }}</span>
                  <button mat-mini-fab color="primary" (click)="updateQuantity(item.product.id, item.quantity + 1)">
                    <mat-icon>add</mat-icon>
                  </button>
                </div>
              </div>
              <div class="col-md-1 text-center">
                <button mat-icon-button color="warn" (click)="removeItem(item.product.id, item.product.name)" class="delete-btn">
                  <i class="fas fa-trash-alt"></i>
                </button>
              </div>
            </div>
          </mat-card>
        </div>

        <div class="col-lg-4">
          <mat-card class="summary-card">
            <mat-card-header>
              <mat-card-title>Order Summary</mat-card-title>
            </mat-card-header>
            <mat-card-content>
              <div class="summary-row">
                <span>Subtotal:</span>
                <span>₹{{ total | number }}</span>
              </div>
              <div class="summary-row">
                <span>Shipping:</span>
                <span class="text-success">FREE</span>
              </div>
              <hr>
              <div class="summary-row total">
                <strong>Total:</strong>
                <strong class="total-price">₹{{ total | number }}</strong>
              </div>
            </mat-card-content>
            <mat-card-actions>
              <button mat-raised-button color="primary" class="w-100 checkout-btn" (click)="proceedToCheckout()">
                <i class="fas fa-lock me-2"></i>Proceed to Checkout
              </button>
            </mat-card-actions>
          </mat-card>
        </div>
      </div>
    </div>

    <div class="empty-cart-container" *ngIf="cartItems.length === 0">
      <div class="empty-cart">
        <mat-card class="text-center py-5">
          <mat-card-content>
            <i class="fas fa-shopping-cart"></i>
            <h2 class="mt-4">Your cart is empty</h2>
            <p class="text-muted">Start shopping to add items to your cart</p>
            <button mat-raised-button color="primary" (click)="continueShopping()">
              <i class="fas fa-shopping-bag me-2"></i>Continue Shopping
            </button>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</div>
